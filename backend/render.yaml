services:
  - type: web
    name: aims-django-backend
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn aims_backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
